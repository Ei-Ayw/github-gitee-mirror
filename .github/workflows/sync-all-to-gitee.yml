# GitHub → Gitee 全量兜底同步（低频）
# 每周一次全量遍历所有仓库，确保 Gitee 上的镜像与 GitHub 完全一致
# 日常增量同步由 sync-repo-to-gitee.yml（push 触发）负责
#
# 配置 Secrets（在仓库 Settings → Secrets → Actions 中）：
#   - GH_PAT        : GitHub PAT（https://github.com/settings/tokens，勾选 repo）
#   - GITEE_TOKEN    : Gitee PAT（https://gitee.com/profile/personal_access_tokens，勾选 projects）
#   - GITEE_USERNAME : Gitee 用户名

name: Weekly Full Sync to Gitee

on:
  schedule:
    - cron: "3 2 * * 1"   # 每周一凌晨 02:03 UTC
  workflow_dispatch:        # 随时手动触发全量同步

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate tokens
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
        run: |
          echo "🔍 验证 GitHub PAT..."
          GH_CODE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token ${GH_PAT}" \
            "https://api.github.com/user")
          if [ "$GH_CODE" != "200" ]; then
            echo "❌ GitHub PAT 无效 (HTTP ${GH_CODE})，请检查 GH_PAT secret 是否配置正确"
            exit 1
          fi
          echo "✅ GitHub PAT 有效"

          echo "🔍 验证 Gitee Token..."
          GITEE_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/user?access_token=${GITEE_TOKEN}")
          if [ "$GITEE_CODE" != "200" ]; then
            echo "❌ Gitee Token 无效 (HTTP ${GITEE_CODE})，请检查 GITEE_TOKEN secret 是否配置正确"
            exit 1
          fi
          echo "✅ Gitee Token 有效 (用户: ${GITEE_USERNAME})"

      - name: Fetch all GitHub repos
        id: repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 分页获取所有仓库
          PAGE=1
          ALL_REPOS=""
          while true; do
            RESPONSE=$(curl -s -H "Authorization: token ${GH_PAT}" \
              "https://api.github.com/user/repos?per_page=100&page=${PAGE}&visibility=all")
            BATCH=$(echo "$RESPONSE" | jq -r '.[] | "\(.clone_url) \(.name) \(.private)"' 2>/dev/null)
            if [ -z "$BATCH" ]; then
              break
            fi
            ALL_REPOS="${ALL_REPOS}${BATCH}\n"
            PAGE=$((PAGE + 1))
          done

          REPOS=$(echo -e "$ALL_REPOS" | sed '/^$/d')

          echo "📋 找到以下仓库："
          echo "$REPOS" | while read line; do echo "  $line"; done

          TOTAL=$(echo "$REPOS" | wc -l | tr -d ' ')
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT
          echo "$REPOS" > repo_list.txt

      - name: Sync each repo to Gitee
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
        run: |
          set +e
          SUCCESS=0
          FAIL=0

          while read CLONE_URL REPO_NAME IS_PRIVATE; do
            echo "🔄 同步: ${REPO_NAME} (private=${IS_PRIVATE})"

            # 私有仓库注入 token
            if [ "$IS_PRIVATE" = "true" ]; then
              AUTH_URL="${CLONE_URL/https:\/\//https:\/\/oauth2:${GH_PAT}@}"
            else
              AUTH_URL="${CLONE_URL}"
            fi

            # 确保 Gitee 仓库存在
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://gitee.com/api/v5/repos/${GITEE_USERNAME}/${REPO_NAME}?access_token=${GITEE_TOKEN}")

            if [ "$HTTP_CODE" = "404" ]; then
              echo "  📦 创建 Gitee 仓库..."
              HTTP_HEADER_FILE=$(mktemp)
              CREATE_BODY=$(curl -s -o - -D "$HTTP_HEADER_FILE" -X POST \
                "https://gitee.com/api/v5/user/repos" \
                -F "access_token=${GITEE_TOKEN}" \
                -F "name=${REPO_NAME}" \
                -F "private=true" \
                -F "auto_init=false")
              CREATE_CODE=$(grep -i "^HTTP/" "$HTTP_HEADER_FILE" | head -1 | awk '{print $2}')
              rm -f "$HTTP_HEADER_FILE"
              echo "  📡 HTTP Status: ${CREATE_CODE}"
              if [ "$CREATE_CODE" != "201" ]; then
                echo "  ❌ 创建 Gitee 仓库失败 (HTTP ${CREATE_CODE}): ${CREATE_BODY}"
                FAIL=$((FAIL + 1))
                continue
              fi
              echo "  ✅ Gitee 仓库已创建"
              sleep 3
              # 验证仓库确实存在
              VERIFY_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                "https://gitee.com/api/v5/repos/${GITEE_USERNAME}/${REPO_NAME}?access_token=${GITEE_TOKEN}")
              if [ "$VERIFY_CODE" != "200" ]; then
                echo "  ❌ 仓库创建后验证失败 (HTTP ${VERIFY_CODE})，跳过推送"
                FAIL=$((FAIL + 1))
                continue
              fi
            elif [ "$HTTP_CODE" != "200" ]; then
              echo "  ⚠️ 检查 Gitee 仓库状态异常 (HTTP ${HTTP_CODE})，跳过"
              FAIL=$((FAIL + 1))
              continue
            fi

            # Clone + Push
            GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${REPO_NAME}.git"
            TMP_DIR=$(mktemp -d)

            if git clone --mirror "${AUTH_URL}" "$TMP_DIR/repo.git" 2>&1; then
              cd "$TMP_DIR/repo.git"
              if git push --mirror "${GITEE_URL}" 2>&1; then
                echo "  ✅ ${REPO_NAME} 镜像推送成功"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "  ⚠️ 回退到 --all + --tags..."
                if git push --all "${GITEE_URL}" 2>&1 && git push --tags "${GITEE_URL}" 2>&1; then
                  echo "  ✅ ${REPO_NAME} 回退推送成功"
                  SUCCESS=$((SUCCESS + 1))
                else
                  echo "  ❌ ${REPO_NAME} 推送失败"
                  FAIL=$((FAIL + 1))
                fi
              fi
              cd "$GITHUB_WORKSPACE"
            else
              echo "  ❌ ${REPO_NAME} 克隆失败"
              FAIL=$((FAIL + 1))
            fi

            rm -rf "$TMP_DIR"
            sleep 2

          done < repo_list.txt

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 ✅ ${SUCCESS} / ❌ ${FAIL} / 总计 ${{ steps.repos.outputs.total }}"

      - name: Cleanup
        if: always()
        run: rm -f repo_list.txt