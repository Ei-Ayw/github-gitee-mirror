# GitHub → Gitee 全量仓库自动同步
# 自动遍历你 GitHub 账户下的所有仓库，逐个镜像同步到 Gitee
#
# 使用方法：
#   1. 创建一个专门的"同步调度"仓库（如 github-gitee-sync），把这个 workflow 放进去
#   2. 在该仓库 Settings → Secrets and variables → Actions 中添加：
#      - GH_PAT        : GitHub 个人访问令牌（https://github.com/settings/tokens，勾选 repo 权限）
#      - GITEE_TOKEN    : Gitee 个人访问令牌（https://gitee.com/profile/personal_access_tokens，勾选 projects 权限）
#      - GITEE_USERNAME : 你的 Gitee 用户名
#   3. push 或手动触发即可同步全部仓库
#
# 注意：这个 workflow 放在"调度仓库"里，它会自动遍历你 GitHub 账户的所有仓库
#       不需要给每个仓库单独配置 workflow

name: Sync All Repos to Gitee

on:
  schedule:
    - cron: "3 2 * * *"   # 每天凌晨 02:03 UTC 自动同步
  workflow_dispatch:        # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      # 1. 安装 jq（GitHub runner 通常自带，但确保可用）
      - name: Install jq
        run: sudo apt-get install -y jq

      # 2. 获取 GitHub 账户下所有仓库列表
      - name: Fetch all GitHub repos
        id: repos
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          # 用 GH_PAT 获取私有+公开仓库列表
          REPOS=$(curl -s -H "Authorization: token ${GH_PAT}" \
            "https://api.github.com/user/repos?per_page=100&visibility=all" \
            | jq -r '.[] | "\(.clone_url) \(.name) \(.private)"')

          echo "📋 找到以下仓库："
          echo "$REPOS" | while read line; do echo "  $line"; done

          TOTAL=$(echo "$REPOS" | wc -l | tr -d ' ')
          echo "total=${TOTAL}" >> $GITHUB_OUTPUT

          # 写入文件供后续步骤使用（格式：clone_url name is_private）
          echo "$REPOS" > repo_list.txt

      # 3. 逐个同步每个仓库到 Gitee
      - name: Sync each repo to Gitee
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
        run: |
          SUCCESS=0
          FAIL=0

          while read CLONE_URL REPO_NAME IS_PRIVATE; do
            echo "🔄 正在同步: ${REPO_NAME} (private=${IS_PRIVATE})"

            # 3a. 对私有仓库，注入 GitHub Token 到 clone URL
            if [ "$IS_PRIVATE" = "true" ]; then
              AUTH_CLONE_URL="${CLONE_URL/https:\/\//https:\/\/oauth2:${GH_PAT}@}"
            else
              AUTH_CLONE_URL="${CLONE_URL}"
            fi

            # 3b. 确保目标 Gitee 仓库存在
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://gitee.com/api/v5/repos/${GITEE_USERNAME}/${REPO_NAME}?access_token=${GITEE_TOKEN}")

            if [ "$HTTP_CODE" = "404" ]; then
              echo "  📦 Gitee 仓库不存在，正在创建..."
              CREATE_RES=$(curl -s -X POST "https://gitee.com/api/v5/user/repos" \
                -H "Content-Type: application/json" \
                -d "{
                  \"access_token\": \"${GITEE_TOKEN}\",
                  \"name\": \"${REPO_NAME}\",
                  \"private\": true,
                  \"description\": \"Mirrored from ${CLONE_URL}\",
                  \"auto_init\": false
                }")
              CREATE_STATUS=$(echo "$CREATE_RES" | jq -r '.id // empty')
              if [ -n "$CREATE_STATUS" ]; then
                echo "  ✅ 仓库创建成功"
              else
                echo "  ⚠️ 仓库创建可能失败: $(echo $CREATE_RES | jq -r '.message // empty')"
              fi
              sleep 3  # 等待仓库创建完成
            else
              echo "  ✅ Gitee 仓库已存在"
            fi

            # 3c. Clone mirror + push mirror
            GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${REPO_NAME}.git"
            TMP_DIR=$(mktemp -d)

            # Clone
            if git clone --mirror "${AUTH_CLONE_URL}" "$TMP_DIR/repo.git" 2>&1; then
              cd "$TMP_DIR/repo.git"

              # Push: 先 mirror，失败回退到 all + tags
              if git push --mirror "${GITEE_URL}" 2>&1; then
                echo "  ✅ ${REPO_NAME} 镜像推送成功"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "  ⚠️ 镜像推送被拒绝，回退到 --all + --tags..."
                if git push --all "${GITEE_URL}" 2>&1 && git push --tags "${GITEE_URL}" 2>&1; then
                  echo "  ✅ ${REPO_NAME} 回退推送成功"
                  SUCCESS=$((SUCCESS + 1))
                else
                  echo "  ❌ ${REPO_NAME} 推送失败"
                  FAIL=$((FAIL + 1))
                fi
              fi

              cd "$GITHUB_WORKSPACE"
            else
              echo "  ❌ ${REPO_NAME} 克隆失败"
              FAIL=$((FAIL + 1))
            fi

            rm -rf "$TMP_DIR"
            sleep 2  # 简单限流，避免 API 过快

          done < repo_list.txt

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📊 同步完成: ✅ ${SUCCESS} 成功 / ❌ ${FAIL} 失败 / 总计 ${{ steps.repos.outputs.total }}"

      # 4. 清理临时文件
      - name: Cleanup
        if: always()
        run: rm -f repo_list.txt