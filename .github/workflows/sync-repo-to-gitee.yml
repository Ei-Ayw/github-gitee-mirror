# GitHub → Gitee 单仓库增量同步
# 当你 push 代码到任意分支时，只同步当前被 push 的这个仓库到 Gitee
# 全量兜底同步由 sync-all-to-gitee.yml（每周定时）负责
#
# 配置 Secrets（在仓库 Settings → Secrets → Actions 中）：
#   - GH_PAT        : GitHub PAT（https://github.com/settings/tokens，勾选 repo）—— 私有仓库 clone 需要
#   - GITEE_TOKEN    : Gitee PAT（https://gitee.com/profile/personal_access_tokens，勾选 projects）
#   Gitee 用户名会自动从 Token 获取，无需手动设置

name: Sync Repo to Gitee

on:
  push:
    branches: ["*"]
  workflow_dispatch:
    inputs:
      repo_name:
        description: "手动指定要同步的仓库名（留空则同步当前仓库）"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Validate tokens and resolve Gitee username
        id: tokens
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          echo "🔍 验证 Gitee Token..."
          GITEE_USER=$(curl -s "https://gitee.com/api/v5/user?access_token=${GITEE_TOKEN}" | jq -r '.login')
          if [ -z "$GITEE_USER" ] || [ "$GITEE_USER" = "null" ]; then
            echo "❌ Gitee Token 无效，请检查 GITEE_TOKEN secret"
            exit 1
          fi
          echo "✅ Gitee Token 有效 (真实用户名: ${GITEE_USER})"
          echo "gitee_username=${GITEE_USER}" >> $GITHUB_OUTPUT

      - name: Determine target repo
        id: target
        env:
          MANUAL_REPO: ${{ github.event.inputs.repo_name }}
        run: |
          # 手动触发可以指定任意仓库；push 触发同步当前仓库
          if [ -n "$MANUAL_REPO" ]; then
            REPO_NAME="$MANUAL_REPO"
          else
            REPO_NAME="${{ github.event.repository.name }}"
          fi
          echo "name=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "🔄 目标仓库: ${REPO_NAME}"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 全量检出，含所有分支和标签

      - name: Ensure Gitee repo exists
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ steps.tokens.outputs.gitee_username }}
        run: |
          set +e
          REPO_NAME="${{ steps.target.outputs.name }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://gitee.com/api/v5/repos/${GITEE_USERNAME}/${REPO_NAME}?access_token=${GITEE_TOKEN}")

          if [ "$HTTP_CODE" = "404" ]; then
            echo "📦 创建 Gitee 仓库..."
            CREATE_BODY=$(curl -s -X POST \
              "https://gitee.com/api/v5/user/repos" \
              -F "access_token=${GITEE_TOKEN}" \
              -F "name=${REPO_NAME}" \
              -F "private=true" \
              -F "auto_init=false")
            # 检查是否创建成功（201）或已存在（422）
            if echo "$CREATE_BODY" | grep -q '"id"'; then
              echo "✅ Gitee 仓库已创建"
            elif echo "$CREATE_BODY" | grep -q '已存在'; then
              echo "⚠️ Gitee 仓库已存在（忽略大小写），继续同步"
            else
              echo "❌ 创建 Gitee 仓库失败: ${CREATE_BODY}"
              exit 1
            fi
            sleep 5
          elif [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ 检查 Gitee 仓库状态异常 (HTTP ${HTTP_CODE})"
            exit 1
          else
            echo "✅ Gitee 仓库已存在"
          fi

      - name: Push to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_USERNAME: ${{ steps.tokens.outputs.gitee_username }}
        run: |
          set +e
          REPO_NAME="${{ steps.target.outputs.name }}"
          GITEE_URL="https://oauth2:${GITEE_TOKEN}@gitee.com/${GITEE_USERNAME}/${REPO_NAME}.git"

          git remote add gitee "$GITEE_URL"

          echo "⬆️ 推送到 Gitee..."
          if git push --mirror gitee 2>&1; then
            echo "✅ 镜像推送成功"
          else
            echo "⚠️ 回退到 --all + --tags..."
            git push --all gitee
            git push --tags gitee
            echo "✅ 回退推送成功"
          fi